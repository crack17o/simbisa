# Simbisa — Nginx production
# Les médias KYC (/media/kyc/) passent par Django (JWT requis).
# Les autres médias et les fichiers statiques sont servis directement.

upstream simbisa_api {
    server api:8000;
    keepalive 32;
}

# Redirection HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/simbisa.rawbank.cd/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/simbisa.rawbank.cd/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 20M;

    # Fichiers statiques Django (collectstatic)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Médias KYC — proxy vers Django (JWT vérifié par serve_kyc_document)
    location /media/kyc/ {
        proxy_pass         http://simbisa_api;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization $http_authorization;
        proxy_pass_header  Authorization;
    }

    # Autres médias (avatars, exports) — servis directement par Nginx
    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # API Django
    location / {
        proxy_pass         http://simbisa_api;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_read_timeout 120s;
    }
}
