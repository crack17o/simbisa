# Production VPS — à combiner avec docker-compose.yml :
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  db:
    ports: []   # MySQL non exposé publiquement

  redis:
    ports: []   # Redis non exposé publiquement

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        REQUIREMENTS: production.txt
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    ports:
      - "8000:8000"   # Nginx sur l'hôte proxy vers ce port
    restart: unless-stopped

  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
      args:
        REQUIREMENTS: production.txt
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    command: celery -A config worker -l info -Q default,scoring,rag --concurrency 4
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
      args:
        REQUIREMENTS: production.txt
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    restart: unless-stopped
